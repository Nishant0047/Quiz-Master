<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Results — Quiz Master</title>
  <meta name="description" content="See your score, review every answer, and jump back in.">
  <meta name="theme-color" content="#1B1533">
  <link rel="icon" type="image/svg+xml" href="assets/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700;800&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/dark.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body data-page="result">

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">
        <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="40" height="40" rx="12" fill="#FFB627"/>
          <path d="M14 16.5C14 13 16.7 11 20 11C23.3 11 26 13 26 16.2C26 19 24 20.3 22.3 21.3C20.9 22.1 20 22.8 20 24.5" stroke="#1B1533" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20" cy="29.5" r="1.9" fill="#1B1533"/>
        </svg>
        Quiz Master
      </a>
      <nav class="header-nav">
        <a href="leaderboard.html" class="nav-link">Leaderboard</a>
        <button type="button" id="themeToggle" class="theme-toggle" aria-label="Switch to dark mode"></button>
      </nav>
    </div>
  </header>

  <main>
    <section class="result-hero">
      <div class="container">
        <div class="score-ring-wrap">
          <svg class="score-ring" viewBox="0 0 200 200" aria-hidden="true">
            <circle class="score-ring-bg" cx="100" cy="100" r="90"/>
            <circle class="score-ring-fill" id="scoreRingFill" cx="100" cy="100" r="90"/>
          </svg>
          <span class="score-ring-label" id="scorePercentage">0%</span>
        </div>

        <h1><span class="performance-emoji" id="performanceEmoji" aria-hidden="true"></span> <span id="performanceMessage"></span></h1>
        <p id="scoreDetail"></p>

        <div class="result-stats">
          <div class="stat"><span id="statScore"></span><label>Score</label></div>
          <div class="stat"><span id="statTime"></span><label>Time</label></div>
          <div class="stat"><span id="statCategory"></span><label>Category</label></div>
        </div>

        <div class="result-actions">
          <button type="button" class="btn btn-primary" id="retryBtn">Retry Quiz</button>
          <a href="index.html" class="btn btn-secondary">New Quiz</a>
          <a href="leaderboard.html" class="btn btn-secondary">Leaderboard</a>
        </div>
      </div>
    </section>

    <section class="review-section">
      <div class="container">
        <div class="review-section-head">
          <h2>Review your answers</h2>
        </div>
        <div id="reviewList" class="review-list"></div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span>Quiz Master — built with vanilla JS, no frameworks.</span>
      <a href="index.html" class="nav-link">Take another quiz →</a>
    </div>
  </footer>

  <div id="toastContainer" class="toast-container" aria-live="polite"></div>

  <script src="js/utils.js" defer></script>
  <script src="js/storage.js" defer></script>
  <script src="js/theme.js" defer></script>
  <script src="js/ui.js" defer></script>
  <script src="js/result.js" defer></script>
</body>
</html>
